---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: automation-hub
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: automation-hub-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        host: postgres-rw.database.svc.cluster.local
        port: "5432"
        database: pulp
        username: "{{ .HUB_POSTGRES_USER }}"
        password: "{{ .HUB_POSTGRES_PASSWORD }}"
        sslmode: prefer
        type: unmanaged

        s3-access-key-id: "{{ .SECRET_MINIO_ACCESS_KEY }}"
        s3-secret-access-key: "{{ .SECRET_MINIO_SECRET_KEY }}"
        s3-bucket-name: "automation-hub"
        s3-region: "us-east-1"

        secret_key: "{{ .HUB_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: automation-hub
